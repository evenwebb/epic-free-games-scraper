name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# No concurrency cancel with Pages workflow — independent checks.

jobs:
  test-and-build-site:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest -q

      - name: Generate website from committed DB
        run: python3 generate_website.py

      - name: Verify static site outputs
        run: test -f website/index.html && test -f website/data/games.json
