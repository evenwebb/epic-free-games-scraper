name: Scrape Epic Games and Deploy to GitHub Pages

on:
  schedule:
    # 4pm UK = 16:00 UTC year-round (4pm GMT in winter, 5pm BST in summer)
    - cron: '0 16 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitattributes'

permissions:
  contents: write
  pages: write
  id-token: write

# Cancel in-progress runs when a new one starts (saves free-tier minutes)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single job: hash check first; heavy steps run only when API payload changed (saves a full
  # second-runner checkout + Python setup vs the old two-job layout).
  scrape-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if API response changed
        id: check
        run: python3 scripts/api_hash_check.py

      - uses: actions/setup-python@v6
        if: steps.check.outputs.api_unchanged != 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies and scrape
        if: steps.check.outputs.api_unchanged != 'true'
        run: |
          pip install -q -r requirements.txt
          python3 scrape_epic_games.py

      - name: Check db/images changes
        id: changes
        if: steps.check.outputs.api_unchanged != 'true'
        run: |
          # Only build/deploy when db or images changed - skip if only .api_hash changed
          if git diff --quiet output/epic_games.db output/images/ 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and commit
        if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 generate_website.py
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/epic_games.db output/images/ output/.api_hash
          if ! git diff --staged --quiet; then
            git commit -m "Update database and images - $(date -u +"%Y-%m-%d %H:%M UTC")"
            auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
            for attempt in 1 2 3; do
              if git -c http.https://github.com/.extraheader= \
                -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
                push origin HEAD:main; then
                break
              fi
              echo "Push attempt $attempt failed, retrying..."
              git pull --rebase origin main
            done
          fi

      - name: Commit .api_hash only (when no db/images changes)
        if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/.api_hash
          if ! git diff --staged --quiet; then
            git commit -m "Update API hash - $(date -u +"%Y-%m-%d %H:%M UTC")"
            auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
            for attempt in 1 2 3; do
              if git -c http.https://github.com/.extraheader= \
                -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
                push origin HEAD:main; then
                break
              fi
              echo "Push attempt $attempt failed, retrying..."
              git pull --rebase origin main
            done
          fi

      - if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'true'
        uses: actions/configure-pages@v6

      - if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: './website'

      - name: Deploy to GitHub Pages
        id: deploy
        if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (retry)
        id: deploy_retry
        if: steps.check.outputs.api_unchanged != 'true' && steps.changes.outputs.changed == 'true' && steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - if: always()
        run: |
          echo "### 🎮 Epic Games Scraper" >> $GITHUB_STEP_SUMMARY
          echo "- **API unchanged**: ${{ steps.check.outputs.api_unchanged == 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped heavy steps**: ${{ steps.check.outputs.api_unchanged == 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed**: ${{ steps.deploy.outcome == 'success' || steps.deploy_retry.outcome == 'success' }}" >> $GITHUB_STEP_SUMMARY
